<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年禪修錄 - 仙劍風格版</title>
    <style>
        body { margin: 0; background: #000; font-family: "PingFang TC", serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { width: 100%; max-width: 500px; height: 100%; background: #333; display: flex; flex-direction: column; position: relative; }
        
        /* 冒險走動區 */
        #viewport { 
            position: relative; width: 100%; height: 60%; 
            background: #4A773C; /* 草地顏色 */
            overflow: hidden; border-bottom: 4px solid #8B4513;
        }
        
        /* 地圖裝飾 */
        .obj { position: absolute; font-size: 30px; }
        .temple { left: 180px; top: 50px; font-size: 60px; } /* 禪寺入口 */

        /* 角色 */
        #player { 
            position: absolute; width: 40px; height: 40px; 
            font-size: 35px; transition: 0.1s linear; 
            display: flex; justify-content: center; align-items: center;
            z-index: 100;
        }

        /* 控制盤 */
        #controls {
            position: absolute; bottom: 42%; right: 10px;
            display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(2, 50px);
            gap: 5px; z-index: 200;
        }
        .ctrl-btn { 
            background: rgba(255,255,255,0.3); border: 1px solid #fff; color: white;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; user-select: none;
        }

        /* 屬性與對話區 */
        #ui-panel { flex: 1; background: #F2EFE9; padding: 15px; display: flex; flex-direction: column; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .stat-box { background: #e0dacc; padding: 5px 10px; border-radius: 5px; font-size: 14px; }
        #dialogue { 
            flex: 1; background: #fff; border: 2px solid #8B4513; border-radius: 10px; 
            padding: 10px; font-size: 15px; color: #333; overflow-y: auto;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="viewport">
        <div class="obj temple">⛩️</div>
        <div class="obj" style="left:50px; top:80px;">🌲</div>
        <div class="obj" style="left:300px; top:150px;">🌲</div>
        <div class="obj" style="left:80px; top:220px;">🪵</div>
        <div class="obj" style="left:250px; top:50px;">📚</div>
        
        <div id="player">👦</div>
    </div>

    <div id="controls">
        <div></div><div class="ctrl-btn" onclick="move(0, -20)">↑</div><div></div>
        <div class="ctrl-btn" onclick="move(-20, 0)">←</div>
        <div class="ctrl-btn" onclick="move(0, 20)">↓</div>
        <div class="ctrl-btn" onclick="move(20, 0)">→</div>
    </div>

    <div id="ui-panel">
        <div class="stats-grid">
            <div class="stat-box">定力: <b id="d">10</b></div>
            <div class="stat-box">智慧: <b id="w">10</b></div>
            <div class="stat-box">福德: <b id="f">10</b></div>
            <div class="stat-box">行持: <b id="x">10</b></div>
        </div>
        <div id="dialogue">
            <b>【引導】</b> 使用按鈕控制走動。靠近 ⛩️ 進入大殿，靠近 🪵 出坡掃地，靠近 📚 研讀佛典。
        </div>
        <div style="text-align: center; font-size: 12px; margin-top: 5px; color: #888;" id="lvl">小男生</div>
    </div>
</div>

<script>
    let pos = { x: 200, y: 200 };
    let s = JSON.parse(localStorage.getItem('zen_rpg_v1')) || { d:10, w:10, f:10, x:10, lvl:"小男生" };

    function move(dx, dy) {
        // 更新位置
        pos.x += dx;
        pos.y += dy;

        // 邊界限制
        pos.x = Math.max(0, Math.min(pos.x, 360));
        pos.y = Math.max(0, Math.min(pos.y, 260));

        const player = document.getElementById('player');
        player.style.left = pos.x + 'px';
        player.style.top = pos.y + 'px';

        checkEvent();
    }

    function checkEvent() {
        let msg = "";
        // 碰撞偵測 (簡單距離判斷)
        // ⛩️ 禪寺中心 (180, 50)
        if (Math.abs(pos.x - 180) < 30 && Math.abs(pos.y - 50) < 30) {
            s.d += 1; msg = "你進入了大殿靜坐，定力微升。";
        }
        // 🪵 木頭 (80, 220)
        else if (Math.abs(pos.x - 80) < 30 && Math.abs(pos.y - 220) < 30) {
            s.f += 1; msg = "你在樹林間勞作出坡，福德微升。";
        }
        // 📚 書本 (250, 50)
        else if (Math.abs(pos.x - 250) < 30 && Math.abs(pos.y - 50) < 30) {
            s.w += 1; msg = "你在此處研讀古籍，智慧微升。";
        }

        if(msg) {
            document.getElementById('dialogue').innerHTML = `<b>【事件】</b> ${msg}`;
            updateStats();
        }
    }

    function updateStats() {
        document.getElementById('d').innerText = s.d;
        document.getElementById('w').innerText = s.w;
        document.getElementById('f').innerText = s.f;
        document.getElementById('x').innerText = s.x;
        
        // 依照文件分數晉升
        let mx = Math.max(s.d, s.w, s.f, s.x);
        if(mx > 400) s.lvl = "總長";
        else if(mx > 200) s.lvl = "學長";
        else if(mx > 100) s.lvl = "研經班";
        else if(mx > 40) s.lvl = "中級班";
        
        document.getElementById('lvl').innerText = s.lvl;
        localStorage.setItem('zen_rpg_v1', JSON.stringify(s));
    }

    // 初始化位置
    move(0, 0);
</script>
</body>
</html>
