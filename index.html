<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>少年禪修錄 - 成長版</title>
    <style>
        :root { --ink: #2C2C2C; --paper: #F2EFE9; --gold: #C5A059; --zen: #3D4F40; --red: #8B0000; }
        body { font-family: "PingFang TC", serif; background-color: #D4C4A8; margin: 0; padding: 10px; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .scroll { width: 100%; max-width: 450px; background: var(--paper); border-left: 12px solid #8B4513; border-right: 12px solid #8B4513; border-radius: 5px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); min-height: 95vh; box-sizing: border-box; display: flex; flex-direction: column; }
        .header { text-align: center; margin-bottom: 10px; }
        h2 { color: var(--zen); letter-spacing: 3px; margin: 10px 0; }
        .status-card { background: rgba(197, 160, 89, 0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--gold); }
        .badge { background: var(--gold); color: white; padding: 4px 15px; border-radius: 20px; font-size: 16px; font-weight: bold; display: inline-block; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: rgba(255,255,255,0.5); padding: 8px; border-radius: 5px; text-align: center; }
        .label { font-size: 13px; color: #666; display: block; }
        .val { font-weight: bold; color: var(--ink); font-size: 20px; }
        .actions { display: grid; gap: 10px; }
        button { width: 100%; background: var(--zen); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #2a382d; transition: 0.1s; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2a382d; }
        #log { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; font-style: italic; color: #555; min-height: 60px; border: 1px solid #eee; line-height: 1.5; flex-grow: 1; }
        #demon-ui { background: #ffe6e6; color: var(--red); padding: 8px; text-align: center; border-radius: 5px; font-weight: bold; margin-bottom: 15px; display: none; animation: flash 1.5s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .footer { text-align: center; font-size: 11px; color: #999; margin-top: 20px; padding-bottom: 10px; }
    </style>
</head>
<body>
<div class="scroll">
    <div class="header">
        <div class="badge" id="lvl_display">小男生</div>
        <h2>少年禪修錄</h2>
    </div>

    <div class="status-card">
        <div class="grid">
            <div class="stat-box"><span class="label">定力</span><span class="val" id="d_val">10</span></div>
            <div class="stat-box"><span class="label">智慧</span><span class="val" id="w_val">10</span></div>
            <div class="stat-box"><span class="label">福德</span><span class="val" id="f_val">10</span></div>
            <div class="stat-box"><span class="label">行持</span><span class="val" id="x_val">10</span></div>
        </div>
    </div>

    <div id="demon-ui">⚠️ 察覺心魔：修行越高，愈需謙卑</div>

    <div class="actions">
        <button onclick="train('ding', 3)">🧘 靜坐修行 (定力+3)</button>
        <button onclick="train('wis', 5)">📜 研讀經文 (智慧+5)</button>
        <button onclick="train('bow', 5)">🙏 誠心禮佛 (智/福+5)</button>
        <button onclick="train('fu', 4)">🧹 寺院出坡 (福德+4)</button>
        <button onclick="train('xing', 4)">🕯️ 內觀覺照 (行持+4)</button>
    </div>

    <div id="log">修行是一條沒有終點的路。🌿</div>

    <div class="footer">
        進度已保存於瀏覽器 | <span onclick="resetGame()" style="text-decoration:underline; cursor:pointer;">重置修行</span>
    </div>
</div>

<script>
    // 初始化數據（移除 day 系統）
    let state = JSON.parse(localStorage.getItem('zen_infinity_v1')) || {
        ding: 10, wis: 10, fu: 10, xing: 10, lvl: "小男生", demon: 0
    };

    function train(type, val) {
        // 屬性增加
        if(type === 'ding') state.ding += val;
        else if(type === 'wis') state.wis += val;
        else if(type === 'bow') { state.wis += val; state.fu += val; }
        else if(type === 'fu') state.fu += val;
        else if(type === 'xing') state.xing += val;

        // 心魔邏輯：總分越高，心魔累積越快
        let total = state.ding + state.wis + state.fu + state.xing;
        if(total > 200) state.demon += Math.floor(Math.random() * 10);

        let msg = "🌅 今日修行圓滿。";
        
        // 隨機事件
        const r = Math.random();
        if(r < 0.003) {
            state.ding += 30; state.wis += 30; state.fu += 30; state.xing += 30;
            msg = "🌟【開悟瞬間】你明白了什麼。四屬性大幅提升！";
        } else if(r < 0.1) {
            state.wis += 5; msg = "📜 聞法心得：智慧提升了。";
        } else if(r < 0.15) {
            state.xing -= 2; msg = "💤 稍有懈怠：行持略微下降。";
        }

        // 心魔爆發
        if(state.demon > 100) {
            msg = "🏮【心魔爆發】因傲慢而退轉。智慧 -10，行持 -5。";
            state.wis = Math.max(0, state.wis - 10);
            state.xing = Math.max(0, state.xing - 5);
            state.demon = 0;
        }

        updateLevel();
        saveAndRefresh(msg);
    }

    function updateLevel() {
        const stats = [state.ding, state.wis, state.fu, state.xing];
        const max = Math.max(...stats);
        const count200 = stats.filter(s => s >= 200).length;
        const count400 = stats.filter(s => s >= 400).length;
        
        let newLvl = "小男生";
        
        // 依照文件分數門檻升級
        if (count400 >= 3) newLvl = "總長";
        else if (count200 >= 3) newLvl = "學長";
        else if (max > 100) newLvl = "研經班";
        else if (max > 80) newLvl = "高級班";
        else if (max > 40) newLvl = "中級班";
        else if (max > 20) newLvl = "初級班";

        // 特殊結局達成提示（無盡版改為成就達成）
        if(state.ding >= 400 && state.wis >= 400 && state.fu >= 400 && state.xing >= 400 && state.lvl !== "明心見性") {
            newLvl = "明心見性";
            alert("🌟 恭喜！你已達成最高境界：明心見性！");
        }

        if(newLvl !== state.lvl && newLvl !== "明心見性") {
            state.lvl = newLvl;
            alert(`✨ 晉升！師父說：你可以進入「${newLvl}」修學了。`);
        } else {
            state.lvl = newLvl;
        }
    }

    function saveAndRefresh(msg) {
        document.getElementById('d_val').innerText = state.ding;
        document.getElementById('w_val').innerText = state.wis;
        document.getElementById('f_val').innerText = state.fu;
        document.getElementById('x_val').innerText = state.xing;
        document.getElementById('lvl_display').innerText = state.lvl;
        if(msg) document.getElementById('log').innerText = msg;
        
        // 心魔警告顯示
        document.getElementById('demon-ui').style.display = state.demon > 50 ? 'block' : 'none';
        
        localStorage.setItem('zen_infinity_v1', JSON.stringify(state));
    }

    function resetGame() {
        if(confirm("確定要重頭開始修行嗎？")) {
            localStorage.removeItem('zen_infinity_v1');
            location.reload();
        }
    }

    saveAndRefresh();
</script>
</body>
</html>
